<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Careers - Lahore Shahi Qila</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.08);
            border-radius: 20px;
            padding: 40px;
            max-width: 520px;
            width: 100%;
            transition: 0.4s;
        }
        .login-card:hover {
            border-color: rgba(255, 215, 0, 0.15);
        }
        .login-card .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .login-card .logo h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #ffd700;
        }
        .login-card .logo span {
            color: #ffffff;
        }
        .login-card .subtitle {
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }
        .login-card .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            padding: 14px 18px;
            border-radius: 12px;
        }
        .login-card .form-control:focus {
            border-color: #ffd700;
            outline: none;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.05);
        }
        .login-card .btn-gold {
            background: #ffd700;
            color: #0a0a0a;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
        }
        .login-card .btn-gold:hover {
            background: #e6c200;
            transform: translateY(-2px);
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 8px;
            text-align: center;
        }

        /* Jobs Section (Hidden initially) */
        #jobSection {
            display: none;
            margin-top: 32px;
            border-top: 1px solid rgba(255, 215, 0, 0.08);
            padding-top: 32px;
        }
        #jobSection h4 {
            font-family: 'Playfair Display', serif;
            color: #ffd700;
            text-align: center;
            margin-bottom: 20px;
        }
        .job-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 215, 0, 0.06);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .job-card:hover {
            border-color: rgba(255, 215, 0, 0.15);
            transform: translateX(4px);
        }
        .job-card .info strong {
            color: #ffd700;
        }
        .job-card .info .exp {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            margin-left: 8px;
        }
        .job-card .btn-apply {
            background: transparent;
            border: 1px solid rgba(255, 215, 0, 0.15);
            color: #ffd700;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: 0.3s;
            cursor: pointer;
        }
        .job-card .btn-apply:hover {
            background: #ffd700;
            color: #0a0a0a;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: #1a1a1a;
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 20px;
            padding: 32px;
            max-width: 520px;
            width: 100%;
            animation: modalSlide 0.4s ease;
        }
        @keyframes modalSlide {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .modal-box .close-modal {
            float: right;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.6rem;
            cursor: pointer;
        }
        .modal-box .close-modal:hover {
            color: #ffd700;
        }
        .modal-box h3 {
            font-family: 'Playfair Display', serif;
            color: #ffd700;
        }
        .modal-box .job-label {
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 16px;
        }
        .modal-box .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 10px;
            width: 100%;
        }
        .modal-box .form-control:focus {
            border-color: #ffd700;
            outline: none;
        }
        .modal-box .btn-gold {
            background: #ffd700;
            color: #0a0a0a;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
        }
        .modal-box .btn-gold:hover {
            background: #e6c200;
        }
        .modal-box .form-text {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.75rem;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.2);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back-link:hover {
            color: #ffd700;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">
            <h3>Shahi<span>Qila</span></h3>
        </div>
        <p class="subtitle">Login to explore career opportunities</p>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="mb-3">
                <input type="email" id="loginEmail" class="form-control" placeholder="Email address" required />
            </div>
            <div class="mb-3">
                <input type="password" id="loginPassword" class="form-control" placeholder="Password" required />
            </div>
            <button type="submit" class="btn-gold">Login</button>
            <div id="loginError" class="error-msg"></div>
        </form>

        <!-- Job Section -->
        <div id="jobSection">
            <h4>Current Openings</h4>
            <div id="jobList"></div>
        </div>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="applyModal">
        <div class="modal-box">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <h3>Apply Now</h3>
            <p class="job-label" id="modalJobLabel">Position: Chef</p>
            <form id="applicationForm">
                <input type="hidden" id="jobPosition" />
                <div class="mb-3">
                    <input type="text" id="fullName" class="form-control" placeholder="Full Name" required />
                </div>
                <div class="mb-3">
                    <input type="email" id="email" class="form-control" placeholder="Email Address" required />
                </div>
                <div class="mb-3">
                    <input type="tel" id="phone" class="form-control" placeholder="Phone Number" required />
                </div>
                <div class="mb-3">
                    <input type="file" id="cvFile" class="form-control" accept=".pdf,.doc,.docx" required />
                    <div class="form-text">Upload CV (PDF, DOC, DOCX)</div>
                </div>
                <button type="submit" class="btn-gold">Submit Application</button>
                <div id="applyError" style="color:#ff6b6b; font-size:0.85rem; margin-top:8px;"></div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
