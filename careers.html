<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Careers - Lahore Shahi Qila</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.08);
            border-radius: 20px;
            padding: 40px;
            max-width: 520px;
            width: 100%;
            transition: 0.4s;
        }
        .login-card:hover {
            border-color: rgba(255, 215, 0, 0.15);
        }
        .login-card .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .login-card .logo h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #ffd700;
        }
        .login-card .logo span {
            color: #ffffff;
        }
        .login-card .subtitle {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }

        /* ===== IMPROVED FORM STYLES ===== */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #d0d0d0;
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .form-group .form-control {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 1rem;
            width: 100%;
            transition: 0.3s;
        }
        .form-group .form-control::placeholder {
            color: #aaaaaa;
            font-weight: 300;
            opacity: 1;
        }
        .form-group .form-control:focus {
            border-color: #ffd700;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
            background: rgba(255, 255, 255, 0.08);
        }
        .form-group .form-control[type="file"] {
            padding: 10px 14px;
            color: #d0d0d0;
        }
        .form-group .form-control[type="file"]::file-selector-button {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: #ffd700;
            padding: 6px 16px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }
        .form-group .form-control[type="file"]::file-selector-button:hover {
            background: rgba(255, 215, 0, 0.2);
        }
        .form-group .form-text {
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.75rem;
            margin-top: 4px;
        }

        .btn-gold {
            background: #ffd700;
            color: #0a0a0a;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: 0.3s;
            cursor: pointer;
        }
        .btn-gold:hover {
            background: #e6c200;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.15);
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 8px;
            text-align: center;
        }

        /* Jobs Section */
        #jobSection {
            display: none;
            margin-top: 32px;
            border-top: 1px solid rgba(255, 215, 0, 0.08);
            padding-top: 32px;
        }
        #jobSection h4 {
            font-family: 'Playfair Display', serif;
            color: #ffd700;
            text-align: center;
            margin-bottom: 20px;
        }
        .job-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 215, 0, 0.06);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
            flex-wrap: wrap;
            gap: 8px;
        }
        .job-card:hover {
            border-color: rgba(255, 215, 0, 0.15);
            transform: translateX(4px);
        }
        .job-card .info strong {
            color: #ffd700;
        }
        .job-card .info .exp {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            margin-left: 8px;
        }
        .job-card .btn-apply {
            background: transparent;
            border: 1px solid rgba(255, 215, 0, 0.15);
            color: #ffd700;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: 0.3s;
            cursor: pointer;
        }
        .job-card .btn-apply:hover {
            background: #ffd700;
            color: #0a0a0a;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: #1a1a1a;
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 20px;
            padding: 32px;
            max-width: 520px;
            width: 100%;
            animation: modalSlide 0.4s ease;
        }
        @keyframes modalSlide {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .modal-box .close-modal {
            float: right;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.6rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal-box .close-modal:hover {
            color: #ffd700;
            transform: rotate(90deg);
        }
        .modal-box h3 {
            font-family: 'Playfair Display', serif;
            color: #ffd700;
        }
        .modal-box .job-label {
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 16px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.2);
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .back-link:hover {
            color: #ffd700;
        }

        @media (max-width: 500px) {
            .login-card {
                padding: 24px;
            }
            .job-card {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">
            <h3>Shahi<span>Qila</span></h3>
        </div>
        <p class="subtitle">Login to explore career opportunities</p>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email address" required />
            </div>
            <div class="form-group">
                <label for="loginPassword"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required />
            </div>
            <button type="submit" class="btn-gold"><i class="fas fa-sign-in-alt"></i> Login</button>
            <div id="loginError" class="error-msg"></div>
        </form>

        <!-- Job Section -->
        <div id="jobSection">
            <h4>Current Openings</h4>
            <div id="jobList"></div>
        </div>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="applyModal">
        <div class="modal-box">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <h3>Apply Now</h3>
            <p class="job-label" id="modalJobLabel">Position: Chef</p>
            <form id="applicationForm">
                <input type="hidden" id="jobPosition" />

                <div class="form-group">
                    <label for="fullName"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="fullName" class="form-control" placeholder="Enter your full name" required />
                </div>
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email address" required />
                </div>
                <div class="form-group">
                    <label for="phone"><i class="fas fa-phone"></i> Phone Number</label>
                    <input type="tel" id="phone" class="form-control" placeholder="Enter your phone number" required />
                </div>
                <div class="form-group">
                    <label for="cvFile"><i class="fas fa-file-pdf"></i> Upload CV</label>
                    <input type="file" id="cvFile" class="form-control" accept=".pdf,.doc,.docx" required />
                    <div class="form-text">Supported: PDF, DOC, DOCX</div>
                </div>
                <button type="submit" class="btn-gold"><i class="fas fa-paper-plane"></i> Submit Application</button>
                <div id="applyError" class="error-msg"></div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
