<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #ffffff;
            padding: 20px 0;
        }
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.08);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: 0.3s;
        }
        .stat-card:hover {
            border-color: rgba(255, 215, 0, 0.15);
            transform: translateY(-4px);
        }
        .stat-card .number {
            font-size: 2.6rem;
            font-weight: 700;
            color: #ffd700;
        }
        .stat-card .label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            margin-top: 4px;
        }
        .stat-card .icon {
            font-size: 1.8rem;
            color: rgba(255, 215, 0, 0.3);
            margin-bottom: 8px;
        }

        .applications-table {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 215, 0, 0.06);
            border-radius: 16px;
            padding: 24px;
            margin-top: 32px;
            overflow-x: auto;
        }
        .applications-table h2 {
            color: #ffd700;
            font-weight: 400;
            font-size: 1.6rem;
            margin-bottom: 20px;
        }
        .table {
            color: #ffffff;
            font-size: 0.9rem;
        }
        .table th {
            color: #ffd700;
            font-weight: 500;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            padding: 12px 8px;
        }
        .table td {
            border-color: rgba(255, 255, 255, 0.04);
            padding: 12px 8px;
            vertical-align: middle;
        }
        .table .cv-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.15);
            color: #ffd700;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            transition: 0.3s;
            cursor: pointer;
        }
        .table .cv-btn:hover {
            background: #ffd700;
            color: #0a0a0a;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.08);
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            margin: 60px auto 0;
        }
        .login-card h3 {
            color: #ffd700;
            text-align: center;
            font-weight: 400;
        }
        .login-card p {
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            margin-bottom: 24px;
        }
        .login-card input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 10px;
            width: 100%;
        }
        .login-card input:focus {
            border-color: #ffd700;
            outline: none;
        }
        .login-card .btn-gold {
            background: #ffd700;
            color: #0a0a0a;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
        }
        .login-card .btn-gold:hover {
            background: #e6c200;
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 8px;
            text-align: center;
        }
        .loading {
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            padding: 40px 0;
        }

        .logout-btn {
            float: right;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            padding: 8px 20px;
            border-radius: 20px;
            transition: 0.3s;
            cursor: pointer;
        }
        .logout-btn:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .job-badge {
            display: inline-block;
            background: rgba(255, 215, 0, 0.08);
            color: #ffd700;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .stat-card .number {
                font-size: 2rem;
            }
            .table {
                font-size: 0.75rem;
            }
            .table th,
            .table td {
                padding: 8px 4px;
            }
            .login-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Login Form -->
        <div id="loginSection">
            <div class="login-card">
                <h3>Admin Login</h3>
                <p>Enter your credentials</p>
                <form id="adminLoginForm">
                    <div class="mb-3">
                        <input type="email" id="adminEmail" placeholder="Email address" required />
                    </div>
                    <div class="mb-3">
                        <input type="password" id="adminPassword" placeholder="Password" required />
                    </div>
                    <button type="submit" class="btn-gold">Login</button>
                    <div id="loginError" class="error-msg"></div>
                </form>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="adminSection" style="display: none;">
            <div class="dashboard">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px;">
                    <h2 style="color: #ffd700; font-weight: 400; margin: 0;">Admin Dashboard</h2>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>

                <!-- Stats -->
                <div class="row g-4" id="statsRow">
                    <div class="col-md-3 col-6">
                        <div class="stat-card">
                            <div class="icon"><i class="fas fa-users"></i></div>
                            <div class="number" id="totalApps">0</div>
                            <div class="label">Total Applications</div>
                        </div>
                    </div>
                    <div class="col-md-3 col-6">
                        <div class="stat-card">
                            <div class="icon"><i class="fas fa-briefcase"></i></div>
                            <div class="number" id="totalJobs">0</div>
                            <div class="label">Unique Jobs</div>
                        </div>
                    </div>
                    <div class="col-md-3 col-6">
                        <div class="stat-card">
                            <div class="icon"><i class="fas fa-file-pdf"></i></div>
                            <div class="number" id="totalCVs">0</div>
                            <div class="label">CVs Uploaded</div>
                        </div>
                    </div>
                    <div class="col-md-3 col-6">
                        <div class="stat-card">
                            <div class="icon"><i class="fas fa-calendar-day"></i></div>
                            <div class="number" id="todayApps">0</div>
                            <div class="label">Today</div>
                        </div>
                    </div>
                </div>

                <!-- Applications Table -->
                <div class="applications-table">
                    <h2><i class="fas fa-list"></i> Applications</h2>
                    <div id="loading" class="loading"><i class="fas fa-spinner fa-spin"></i> Loading applications...</div>
                    <table class="table" id="applicationsTable" style="display: none;">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Job</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>CV</th>
                                <th>Timestamp</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
        import { signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        const loginSection = document.getElementById('loginSection');
        const adminSection = document.getElementById('adminSection');
        const loginForm = document.getElementById('adminLoginForm');
        const loginError = document.getElementById('loginError');
        const loading = document.getElementById('loading');
        const table = document.getElementById('applicationsTable');
        const tbody = document.getElementById('tableBody');

        const totalApps = document.getElementById('totalApps');
        const totalJobs = document.getElementById('totalJobs');
        const totalCVs = document.getElementById('totalCVs');
        const todayApps = document.getElementById('todayApps');

        // Auth state
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSection.style.display = 'none';
                adminSection.style.display = 'block';
                loadData();
            }
        });

        // Login
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value.trim();

            signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    loginError.textContent = '';
                })
                .catch(() => {
                    loginError.textContent = 'Invalid email or password.';
                });
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', function() {
            signOut(auth);
            location.reload();
        });

        // Load Data
        function loadData() {
            const colRef = collection(db, 'applications');
            let allData = [];

            onSnapshot(colRef, (snapshot) => {
                loading.style.display = 'none';
                table.style.display = 'table';
                tbody.innerHTML = '';
                allData = [];

                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center">No applications yet.</td></tr>';
                    updateStats([]);
                    return;
                }

                let count = 1;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const row = tbody.insertRow();
                    row.insertCell(0).textContent = count++;
                    row.insertCell(1).textContent = `<span class="job-badge">${data.job || 'N/A'}</span>`;
                    row.insertCell(2).textContent = data.name || 'N/A';
                    row.insertCell(3).textContent = data.email || 'N/A';
                    row.insertCell(4).textContent = data.phone || 'N/A';
                    const cvCell = row.insertCell(5);
                    if (data.cv) {
                        const btn = document.createElement('button');
                        btn.className = 'cv-btn';
                        btn.innerHTML = '<i class="fas fa-download"></i> Download';
                        btn.onclick = () => downloadCV(data.cv, data.cvName || 'CV.pdf');
                        cvCell.appendChild(btn);
                    } else {
                        cvCell.textContent = 'No CV';
                    }
                    row.insertCell(6).textContent = data.timestamp ? new Date(data.timestamp).toLocaleString() : 'N/A';
                    allData.push(data);
                });

                updateStats(allData);
            }, (error) => {
                loading.textContent = 'Error loading data. Check console.';
                console.error('Firestore error:', error);
            });
        }

        function updateStats(data) {
            totalApps.textContent = data.length;
            const jobs = new Set(data.map(d => d.job).filter(Boolean));
            totalJobs.textContent = jobs.size;
            const hasCV = data.filter(d => d.cv).length;
            totalCVs.textContent = hasCV;
            const today = new Date().toDateString();
            const todayCount = data.filter(d => d.timestamp && new Date(d.timestamp).toDateString() === today).length;
            todayApps.textContent = todayCount;
        }

        function downloadCV(base64, filename) {
            const link = document.createElement('a');
            link.href = base64;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
